<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>破十法</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', 'Microsoft YaHei', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%);
            cursor: pointer;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            padding: 35px 40px;
            margin: 20px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 8px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .formula-box {
            background: linear-gradient(135deg, #fc4a1a 0%, #f7b733 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 16px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease;
        }

        .formula-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        .message {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            min-height: 32px;
        }

        .demo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .step-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 18px;
            background: linear-gradient(145deg, #fff8f0, #ffe8d0);
            border-radius: 20px;
            min-width: 650px;
        }

        .number-group {
            display: flex;
            gap: 5px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            min-width: 60px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 200px;
        }

        .number-group.ten-group {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 193, 7, 0.3));
            border: 3px solid #ffc107;
        }

        .ball {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            font-weight: 600;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .ball.show {
            opacity: 1;
            transform: scale(1);
        }

        .ball.blue {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .ball.removed {
            opacity: 0.3;
            transform: scale(0.7);
            background: linear-gradient(135deg, #bdc3c7 0%, #95a5a6 100%);
            text-decoration: line-through;
        }

        .ball.highlight {
            animation: pulse 0.6s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .symbol {
            font-size: 32px;
            font-weight: 700;
            color: #fc4a1a;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .symbol.show {
            opacity: 1;
        }

        .step-label {
            font-size: 16px;
            color: #e67e22;
            font-weight: 600;
            opacity: 0;
            transition: all 0.4s ease;
            text-align: center;
        }

        .step-label.show {
            opacity: 1;
        }

        .arrow {
            font-size: 24px;
            color: #fc4a1a;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .arrow.show {
            opacity: 1;
        }

        .result-display {
            font-size: 48px;
            font-weight: 800;
            color: #e74c3c;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s ease;
        }

        .result-display.show {
            opacity: 1;
            transform: scale(1);
        }

        .explanation {
            text-align: center;
            font-size: 18px;
            color: #e67e22;
            padding: 18px 25px;
            background: rgba(252, 74, 26, 0.1);
            border-radius: 16px;
            border-left: 5px solid #fc4a1a;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .explanation.show {
            opacity: 1;
            transform: translateY(0);
        }

        .pause-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90px;
            height: 90px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            pointer-events: none;
            z-index: 100;
        }

        .pause-indicator.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .pause-indicator svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        .step-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="pause-indicator" id="pauseIndicator">
        <svg viewBox="0 0 24 24" id="pauseIcon">
            <polygon points="5,3 19,12 5,21" />
        </svg>
    </div>

    <div class="app-container">
        <h1>破十法</h1>
        <p class="subtitle">退位减法时，把十位的 10 拆开来减</p>

        <div class="formula-box" id="formula">
            15 − 7 = 10 − 7 + 5 = 3 + 5 = 8
        </div>

        <div class="message" id="message"></div>

        <div class="demo-area">
            <!-- 第一步：原始 15 -->
            <div class="step-container" id="step1">
                <div class="step-row">
                    <span class="step-label show">十位</span>
                    <div class="number-group ten-group" id="groupTen"></div>
                </div>
                <div class="step-row">
                    <span class="step-label show">个位</span>
                    <div class="number-group" id="groupOnes"></div>
                </div>
                <span class="symbol" id="minus1">−</span>
                <span class="symbol" id="num7" style="font-size: 36px;">7</span>
            </div>

            <span class="arrow" id="arrow1">↓</span>
            <span class="step-label" id="label1">个位 5 不够减 7，向十位借</span>

            <!-- 第二步：从10里减7 -->
            <div class="step-container" id="step2" style="display: none;">
                <div class="step-row">
                    <span class="step-label show">从10减7</span>
                    <div class="number-group ten-group" id="groupTen2"></div>
                </div>
                <span class="symbol" id="equals1">=</span>
                <span class="symbol" id="num3" style="font-size: 36px; color: #27ae60;">3</span>
            </div>

            <span class="arrow" id="arrow2">↓</span>
            <span class="step-label" id="label2">3 + 个位的 5</span>

            <!-- 第三步：3 + 5 = 8 -->
            <div class="step-container" id="step3" style="display: none;">
                <div class="number-group" id="group3"></div>
                <span class="symbol" id="plus1">+</span>
                <div class="number-group" id="group5"></div>
                <span class="symbol" id="equals2">=</span>
                <span class="result-display" id="result">8</span>
            </div>
        </div>

        <div class="explanation" id="explanation">
            破十法口诀：减9加1，减8加2，减7加3，减6加4，减5加5
        </div>
    </div>

    <script>
        const formula = document.getElementById('formula');
        const message = document.getElementById('message');
        const explanation = document.getElementById('explanation');
        const pauseIndicator = document.getElementById('pauseIndicator');

        let isPaused = false;
        let currentResolve = null;
        let remainingTime = 0;
        let startTime = 0;
        let currentTimeout = null;

        document.body.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                if (currentTimeout) {
                    clearTimeout(currentTimeout);
                    remainingTime = Math.max(0, remainingTime - (Date.now() - startTime));
                }
                pauseIndicator.classList.add('show');
            } else {
                pauseIndicator.classList.remove('show');
                if (currentResolve && remainingTime >= 0) {
                    startTime = Date.now();
                    currentTimeout = setTimeout(() => {
                        if (currentResolve) { currentResolve(); currentResolve = null; }
                    }, remainingTime);
                }
            }
        });

        function sleep(ms) {
            return new Promise(resolve => {
                currentResolve = resolve;
                remainingTime = ms;
                if (!isPaused) {
                    startTime = Date.now();
                    currentTimeout = setTimeout(() => { currentResolve = null; resolve(); }, ms);
                }
            });
        }

        function createBalls(container, count, color) {
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const ball = document.createElement('div');
                ball.className = `ball ${color}`;
                ball.textContent = i + 1;
                ball.id = `${container.id}-ball-${i}`;
                ball.style.transitionDelay = `${i * 60}ms`;
                container.appendChild(ball);
            }
        }

        function showBalls(container) {
            container.querySelectorAll('.ball').forEach(ball => ball.classList.add('show'));
        }

        function removeBalls(container, start, count) {
            const balls = container.querySelectorAll('.ball');
            for (let i = start; i < start + count && i < balls.length; i++) {
                balls[i].classList.add('removed');
            }
        }

        function highlightBalls(container) {
            container.querySelectorAll('.ball:not(.removed)').forEach(ball => ball.classList.add('highlight'));
        }

        function resetAll() {
            formula.classList.remove('show');
            explanation.classList.remove('show');
            message.textContent = '';

            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'none';

            document.querySelectorAll('.symbol, .arrow, .step-label').forEach(el => {
                if (!el.classList.contains('show') || el.id) {
                    el.classList.remove('show');
                }
            });
            document.querySelectorAll('.number-group').forEach(g => g.innerHTML = '');
            document.getElementById('result').classList.remove('show');
        }

        async function animate() {
            resetAll();
            await sleep(500);

            // 显示公式
            formula.classList.add('show');
            await sleep(1200);

            // 第一步：显示 15
            message.textContent = '计算 15 − 7';

            // 显示十位的10个球
            createBalls(document.getElementById('groupTen'), 10, 'blue');
            await sleep(100);
            showBalls(document.getElementById('groupTen'));
            await sleep(600);

            // 显示个位的5个球
            createBalls(document.getElementById('groupOnes'), 5, 'blue');
            await sleep(100);
            showBalls(document.getElementById('groupOnes'));
            await sleep(800);

            document.getElementById('minus1').classList.add('show');
            document.getElementById('num7').classList.add('show');
            await sleep(1200);

            // 显示提示
            document.getElementById('arrow1').classList.add('show');
            document.getElementById('label1').classList.add('show');
            message.textContent = '个位 5 < 7，不够减！向十位借';
            await sleep(2000);

            // 第二步：从10里减7
            document.getElementById('step2').style.display = 'flex';

            createBalls(document.getElementById('groupTen2'), 10, 'blue');
            await sleep(100);
            showBalls(document.getElementById('groupTen2'));
            await sleep(600);

            message.textContent = '从 10 里面减掉 7';
            removeBalls(document.getElementById('groupTen2'), 0, 7);
            await sleep(1000);

            document.getElementById('equals1').classList.add('show');
            await sleep(300);
            document.getElementById('num3').classList.add('show');
            message.textContent = '10 − 7 = 3';
            await sleep(1500);

            // 显示第三步提示
            document.getElementById('arrow2').classList.add('show');
            document.getElementById('label2').classList.add('show');
            await sleep(1000);

            // 第三步：3 + 5 = 8
            document.getElementById('step3').style.display = 'flex';

            createBalls(document.getElementById('group3'), 3, 'blue');
            await sleep(100);
            showBalls(document.getElementById('group3'));
            highlightBalls(document.getElementById('group3'));
            await sleep(500);

            document.getElementById('plus1').classList.add('show');
            await sleep(300);

            createBalls(document.getElementById('group5'), 5, 'blue');
            await sleep(100);
            showBalls(document.getElementById('group5'));
            highlightBalls(document.getElementById('group5'));
            await sleep(800);

            document.getElementById('equals2').classList.add('show');
            await sleep(500);

            document.getElementById('result').classList.add('show');
            message.textContent = '3 + 5 = 8，答案是 8！';
            await sleep(1500);

            // 显示解释
            explanation.classList.add('show');
            await sleep(4000);

            animate();
        }

        animate();
    </script>
</body>
</html>
