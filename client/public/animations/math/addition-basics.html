<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加法基础</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', 'Microsoft YaHei', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            margin: 20px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .formula-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            border-radius: 16px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease;
        }

        .formula-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        .demo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            min-height: 120px;
        }

        .group {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: linear-gradient(145deg, #f0f4ff, #e0e5f0);
            border-radius: 20px;
            min-width: 100px;
            justify-content: center;
        }

        .item {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.4);
        }

        .item.show {
            opacity: 1;
            transform: scale(1);
        }

        .item.group-b {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            box-shadow: 0 4px 12px rgba(250, 112, 154, 0.4);
        }

        .symbol {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .symbol.show {
            opacity: 1;
        }

        .result {
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s ease;
        }

        .result.show {
            opacity: 1;
            transform: scale(1);
        }

        .explanation {
            text-align: center;
            font-size: 20px;
            color: #34495e;
            padding: 20px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 16px;
            border-left: 5px solid #667eea;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .explanation.show {
            opacity: 1;
            transform: translateY(0);
        }

        .message {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            min-height: 36px;
        }

        .highlight {
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        .pause-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90px;
            height: 90px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            pointer-events: none;
            z-index: 100;
        }

        .pause-indicator.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .pause-indicator svg {
            width: 36px;
            height: 36px;
            fill: white;
        }
    </style>
</head>
<body>
    <div class="pause-indicator" id="pauseIndicator">
        <svg viewBox="0 0 24 24" id="pauseIcon">
            <polygon points="5,3 19,12 5,21" />
        </svg>
    </div>

    <div class="app-container">
        <h1>加法基础</h1>
        <p class="subtitle">把两部分合在一起，一共有多少</p>

        <div class="formula-box" id="formula">
            加数 + 加数 = 和
        </div>

        <div class="message" id="message"></div>

        <div class="demo-area">
            <div class="group" id="groupA"></div>
            <span class="symbol" id="plus">+</span>
            <div class="group" id="groupB"></div>
            <span class="symbol" id="equals">=</span>
            <span class="result" id="result">5</span>
        </div>

        <div class="explanation" id="explanation">
            3 是第一个加数，2 是第二个加数，5 是它们的和
        </div>
    </div>

    <script>
        const formula = document.getElementById('formula');
        const message = document.getElementById('message');
        const groupA = document.getElementById('groupA');
        const groupB = document.getElementById('groupB');
        const plus = document.getElementById('plus');
        const equals = document.getElementById('equals');
        const result = document.getElementById('result');
        const explanation = document.getElementById('explanation');
        const pauseIndicator = document.getElementById('pauseIndicator');

        let isPaused = false;
        let currentResolve = null;
        let remainingTime = 0;
        let startTime = 0;
        let currentTimeout = null;

        document.body.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                if (currentTimeout) {
                    clearTimeout(currentTimeout);
                    remainingTime = Math.max(0, remainingTime - (Date.now() - startTime));
                }
                pauseIndicator.classList.add('show');
            } else {
                pauseIndicator.classList.remove('show');
                if (currentResolve && remainingTime >= 0) {
                    startTime = Date.now();
                    currentTimeout = setTimeout(() => {
                        if (currentResolve) { currentResolve(); currentResolve = null; }
                    }, remainingTime);
                }
            }
        });

        function sleep(ms) {
            return new Promise(resolve => {
                currentResolve = resolve;
                remainingTime = ms;
                if (!isPaused) {
                    startTime = Date.now();
                    currentTimeout = setTimeout(() => { currentResolve = null; resolve(); }, ms);
                }
            });
        }

        function createItems(container, count, type) {
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const item = document.createElement('div');
                item.className = `item ${type}`;
                item.textContent = type === 'group-b' ? 'B' : 'A';
                item.style.transitionDelay = `${i * 100}ms`;
                container.appendChild(item);
            }
        }

        function showItems(container) {
            container.querySelectorAll('.item').forEach(item => item.classList.add('show'));
        }

        function resetAll() {
            formula.classList.remove('show');
            plus.classList.remove('show');
            equals.classList.remove('show');
            result.classList.remove('show');
            explanation.classList.remove('show');
            groupA.innerHTML = '';
            groupB.innerHTML = '';
            message.textContent = '';
        }

        async function animate() {
            resetAll();
            await sleep(500);

            // 显示公式
            formula.classList.add('show');
            await sleep(1500);

            // 第一个加数
            message.textContent = '小明有 3 个苹果';
            createItems(groupA, 3, 'group-a');
            await sleep(100);
            showItems(groupA);
            await sleep(1200);

            // 加号
            plus.classList.add('show');
            await sleep(500);

            // 第二个加数
            message.textContent = '小红给了他 2 个苹果';
            createItems(groupB, 2, 'group-b');
            await sleep(100);
            showItems(groupB);
            await sleep(1200);

            // 等号
            equals.classList.add('show');
            await sleep(500);

            // 结果
            message.textContent = '现在一共有几个苹果？';
            await sleep(1000);

            result.classList.add('show');
            message.textContent = '一共有 5 个苹果！';
            await sleep(1500);

            // 解释
            explanation.classList.add('show');
            await sleep(4000);

            animate();
        }

        animate();
    </script>
</body>
</html>
