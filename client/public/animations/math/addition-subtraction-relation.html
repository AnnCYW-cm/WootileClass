<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加减法关系</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', 'Microsoft YaHei', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            cursor: pointer;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 850px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            padding: 35px 40px;
            margin: 20px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 8px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .formula-box {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 16px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease;
        }

        .formula-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        .message {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            min-height: 32px;
        }

        .demo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .visual-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 25px;
            background: linear-gradient(145deg, #f8f0ff, #f0e0f5);
            border-radius: 20px;
        }

        .number-group {
            display: flex;
            gap: 8px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            min-width: 60px;
            justify-content: center;
        }

        .ball {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            font-weight: 600;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .ball.show {
            opacity: 1;
            transform: scale(1);
        }

        .ball.blue {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .ball.pink {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .ball.faded {
            opacity: 0.3;
            transform: scale(0.7);
        }

        .symbol {
            font-size: 36px;
            font-weight: 700;
            color: #a18cd1;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .symbol.show {
            opacity: 1;
        }

        .equations-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .equation-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 25px;
            background: linear-gradient(145deg, #fff, #f8f0ff);
            border-radius: 16px;
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.5s ease;
            box-shadow: 0 4px 15px rgba(161, 140, 209, 0.2);
        }

        .equation-row.show {
            opacity: 1;
            transform: translateX(0);
        }

        .equation-row.highlight {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
            color: white;
            transform: scale(1.05);
        }

        .equation-row .num {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 8px;
        }

        .equation-row .num.blue-bg {
            background: rgba(79, 172, 254, 0.2);
            color: #4facfe;
        }

        .equation-row .num.pink-bg {
            background: rgba(250, 112, 154, 0.2);
            color: #fa709a;
        }

        .equation-row .num.purple-bg {
            background: rgba(161, 140, 209, 0.2);
            color: #a18cd1;
        }

        .explanation {
            text-align: center;
            font-size: 18px;
            color: #9b59b6;
            padding: 18px 25px;
            background: rgba(161, 140, 209, 0.1);
            border-radius: 16px;
            border-left: 5px solid #a18cd1;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .explanation.show {
            opacity: 1;
            transform: translateY(0);
        }

        .pause-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90px;
            height: 90px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            pointer-events: none;
            z-index: 100;
        }

        .pause-indicator.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .pause-indicator svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        .arrow-link {
            font-size: 24px;
            color: #a18cd1;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .arrow-link.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="pause-indicator" id="pauseIndicator">
        <svg viewBox="0 0 24 24" id="pauseIcon">
            <polygon points="5,3 19,12 5,21" />
        </svg>
    </div>

    <div class="app-container">
        <h1>加减法关系</h1>
        <p class="subtitle">加法和减法是一对好朋友，互为逆运算</p>

        <div class="formula-box" id="formula">
            知道加法，就能推出两道减法！
        </div>

        <div class="message" id="message"></div>

        <div class="demo-area">
            <div class="visual-container" id="visualContainer">
                <div class="number-group" id="groupA"></div>
                <span class="symbol" id="symbol1">+</span>
                <div class="number-group" id="groupB"></div>
                <span class="symbol" id="symbol2">=</span>
                <div class="number-group" id="groupC"></div>
            </div>

            <span class="arrow-link" id="arrow">↓ 可以推出 ↓</span>

            <div class="equations-container" id="equationsContainer">
                <div class="equation-row" id="eq1">
                    <span class="num blue-bg">3</span>
                    <span>+</span>
                    <span class="num pink-bg">2</span>
                    <span>=</span>
                    <span class="num purple-bg">5</span>
                </div>
                <div class="equation-row" id="eq2">
                    <span class="num purple-bg">5</span>
                    <span>−</span>
                    <span class="num pink-bg">2</span>
                    <span>=</span>
                    <span class="num blue-bg">3</span>
                </div>
                <div class="equation-row" id="eq3">
                    <span class="num purple-bg">5</span>
                    <span>−</span>
                    <span class="num blue-bg">3</span>
                    <span>=</span>
                    <span class="num pink-bg">2</span>
                </div>
            </div>
        </div>

        <div class="explanation" id="explanation">
            一个加法算式可以写出两个减法算式：用和减去一个加数，等于另一个加数
        </div>
    </div>

    <script>
        const formula = document.getElementById('formula');
        const message = document.getElementById('message');
        const groupA = document.getElementById('groupA');
        const groupB = document.getElementById('groupB');
        const groupC = document.getElementById('groupC');
        const symbol1 = document.getElementById('symbol1');
        const symbol2 = document.getElementById('symbol2');
        const arrow = document.getElementById('arrow');
        const eq1 = document.getElementById('eq1');
        const eq2 = document.getElementById('eq2');
        const eq3 = document.getElementById('eq3');
        const explanation = document.getElementById('explanation');
        const pauseIndicator = document.getElementById('pauseIndicator');

        let isPaused = false;
        let currentResolve = null;
        let remainingTime = 0;
        let startTime = 0;
        let currentTimeout = null;

        document.body.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                if (currentTimeout) {
                    clearTimeout(currentTimeout);
                    remainingTime = Math.max(0, remainingTime - (Date.now() - startTime));
                }
                pauseIndicator.classList.add('show');
            } else {
                pauseIndicator.classList.remove('show');
                if (currentResolve && remainingTime >= 0) {
                    startTime = Date.now();
                    currentTimeout = setTimeout(() => {
                        if (currentResolve) { currentResolve(); currentResolve = null; }
                    }, remainingTime);
                }
            }
        });

        function sleep(ms) {
            return new Promise(resolve => {
                currentResolve = resolve;
                remainingTime = ms;
                if (!isPaused) {
                    startTime = Date.now();
                    currentTimeout = setTimeout(() => { currentResolve = null; resolve(); }, ms);
                }
            });
        }

        function createBalls(container, count, color) {
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const ball = document.createElement('div');
                ball.className = `ball ${color}`;
                ball.textContent = i + 1;
                ball.style.transitionDelay = `${i * 80}ms`;
                container.appendChild(ball);
            }
        }

        function showBalls(container) {
            container.querySelectorAll('.ball').forEach(ball => ball.classList.add('show'));
        }

        function resetAll() {
            formula.classList.remove('show');
            symbol1.classList.remove('show');
            symbol2.classList.remove('show');
            arrow.classList.remove('show');
            eq1.classList.remove('show', 'highlight');
            eq2.classList.remove('show', 'highlight');
            eq3.classList.remove('show', 'highlight');
            explanation.classList.remove('show');
            groupA.innerHTML = '';
            groupB.innerHTML = '';
            groupC.innerHTML = '';
            message.textContent = '';
        }

        async function animate() {
            resetAll();
            await sleep(500);

            // 显示公式
            formula.classList.add('show');
            await sleep(1200);

            // 显示第一组数字 (3)
            message.textContent = '小明有 3 颗糖';
            createBalls(groupA, 3, 'blue');
            await sleep(100);
            showBalls(groupA);
            await sleep(1000);

            // 显示加号
            symbol1.classList.add('show');
            await sleep(400);

            // 显示第二组数字 (2)
            message.textContent = '小红给了他 2 颗糖';
            createBalls(groupB, 2, 'pink');
            await sleep(100);
            showBalls(groupB);
            await sleep(1000);

            // 显示等号
            symbol2.classList.add('show');
            await sleep(400);

            // 显示结果 (5)
            message.textContent = '现在一共有 5 颗糖';
            createBalls(groupC, 5, 'blue');
            await sleep(100);
            showBalls(groupC);
            await sleep(1500);

            // 显示箭头
            arrow.classList.add('show');
            message.textContent = '从这个加法，我们可以推出...';
            await sleep(1200);

            // 显示加法算式
            eq1.classList.add('show');
            message.textContent = '3 + 2 = 5';
            await sleep(1500);

            eq1.classList.add('highlight');
            await sleep(800);
            eq1.classList.remove('highlight');

            // 显示第一个减法
            eq2.classList.add('show');
            message.textContent = '5 − 2 = 3（从总数减去一个加数）';
            await sleep(1500);

            eq2.classList.add('highlight');
            await sleep(800);
            eq2.classList.remove('highlight');

            // 显示第二个减法
            eq3.classList.add('show');
            message.textContent = '5 − 3 = 2（从总数减去另一个加数）';
            await sleep(1500);

            eq3.classList.add('highlight');
            await sleep(800);
            eq3.classList.remove('highlight');

            // 显示总结
            message.textContent = '三个数字，写出三道算式！';
            explanation.classList.add('show');
            await sleep(4000);

            animate();
        }

        animate();
    </script>
</body>
</html>
