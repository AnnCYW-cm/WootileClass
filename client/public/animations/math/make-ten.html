<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凑十法</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', 'Microsoft YaHei', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            cursor: pointer;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            padding: 35px 40px;
            margin: 20px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 8px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .formula-box {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 16px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease;
        }

        .formula-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        .message {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            min-height: 32px;
        }

        .demo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .step-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            background: linear-gradient(145deg, #f0fff4, #e0f5e8);
            border-radius: 20px;
            min-width: 600px;
        }

        .number-group {
            display: flex;
            gap: 6px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            min-width: 80px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .number-group.highlight-ten {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 193, 7, 0.3));
            border: 3px solid #ffc107;
        }

        .ball {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .ball.show {
            opacity: 1;
            transform: scale(1);
        }

        .ball.blue {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .ball.pink {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .ball.moving {
            animation: moveOver 0.8s ease forwards;
        }

        @keyframes moveOver {
            0% { transform: scale(1); }
            50% { transform: scale(1.2) translateX(-20px); }
            100% { transform: scale(1); }
        }

        .ball.highlight {
            animation: pulse 0.6s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        .symbol {
            font-size: 36px;
            font-weight: 700;
            color: #11998e;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .symbol.show {
            opacity: 1;
        }

        .equation-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 28px;
            font-weight: 700;
            color: #2c3e50;
            margin-top: 10px;
        }

        .equation-display .num {
            padding: 8px 16px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border-radius: 12px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s ease;
        }

        .equation-display .num.show {
            opacity: 1;
            transform: scale(1);
        }

        .equation-display .op {
            opacity: 0;
            transition: all 0.4s ease;
        }

        .equation-display .op.show {
            opacity: 1;
        }

        .step-label {
            font-size: 16px;
            color: #27ae60;
            font-weight: 600;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .step-label.show {
            opacity: 1;
        }

        .explanation {
            text-align: center;
            font-size: 18px;
            color: #27ae60;
            padding: 18px 25px;
            background: rgba(17, 153, 142, 0.1);
            border-radius: 16px;
            border-left: 5px solid #11998e;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .explanation.show {
            opacity: 1;
            transform: translateY(0);
        }

        .pause-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90px;
            height: 90px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            pointer-events: none;
            z-index: 100;
        }

        .pause-indicator.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .pause-indicator svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        .arrow {
            font-size: 24px;
            color: #11998e;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .arrow.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="pause-indicator" id="pauseIndicator">
        <svg viewBox="0 0 24 24" id="pauseIcon">
            <polygon points="5,3 19,12 5,21" />
        </svg>
    </div>

    <div class="app-container">
        <h1>凑十法</h1>
        <p class="subtitle">看到 8 或 9，先凑成 10，再加剩下的</p>

        <div class="formula-box" id="formula">
            8 + 5 = 8 + 2 + 3 = 10 + 3 = 13
        </div>

        <div class="message" id="message"></div>

        <div class="demo-area">
            <!-- 第一步：原始 8 + 5 -->
            <div class="step-container" id="step1">
                <div class="number-group" id="group8"></div>
                <span class="symbol" id="plus1">+</span>
                <div class="number-group" id="group5"></div>
            </div>

            <span class="arrow" id="arrow1">↓</span>
            <span class="step-label" id="label1">把 5 拆成 2 和 3</span>

            <!-- 第二步：拆分后 8 + 2 + 3 -->
            <div class="step-container" id="step2" style="display: none;">
                <div class="number-group" id="group8b"></div>
                <span class="symbol" id="plus2">+</span>
                <div class="number-group" id="group2"></div>
                <span class="symbol" id="plus3">+</span>
                <div class="number-group" id="group3"></div>
            </div>

            <span class="arrow" id="arrow2">↓</span>
            <span class="step-label" id="label2">8 + 2 凑成 10</span>

            <!-- 第三步：10 + 3 -->
            <div class="step-container" id="step3" style="display: none;">
                <div class="number-group highlight-ten" id="group10"></div>
                <span class="symbol" id="plus4">+</span>
                <div class="number-group" id="group3b"></div>
                <span class="symbol" id="equals">=</span>
                <span class="symbol" id="result" style="font-size: 42px; color: #e74c3c;">13</span>
            </div>
        </div>

        <div class="explanation" id="explanation">
            凑十法口诀：看大数，拆小数，凑成十，加剩数
        </div>
    </div>

    <script>
        const formula = document.getElementById('formula');
        const message = document.getElementById('message');
        const explanation = document.getElementById('explanation');
        const pauseIndicator = document.getElementById('pauseIndicator');

        let isPaused = false;
        let currentResolve = null;
        let remainingTime = 0;
        let startTime = 0;
        let currentTimeout = null;

        document.body.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                if (currentTimeout) {
                    clearTimeout(currentTimeout);
                    remainingTime = Math.max(0, remainingTime - (Date.now() - startTime));
                }
                pauseIndicator.classList.add('show');
            } else {
                pauseIndicator.classList.remove('show');
                if (currentResolve && remainingTime >= 0) {
                    startTime = Date.now();
                    currentTimeout = setTimeout(() => {
                        if (currentResolve) { currentResolve(); currentResolve = null; }
                    }, remainingTime);
                }
            }
        });

        function sleep(ms) {
            return new Promise(resolve => {
                currentResolve = resolve;
                remainingTime = ms;
                if (!isPaused) {
                    startTime = Date.now();
                    currentTimeout = setTimeout(() => { currentResolve = null; resolve(); }, ms);
                }
            });
        }

        function createBalls(container, count, color) {
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const ball = document.createElement('div');
                ball.className = `ball ${color}`;
                ball.textContent = i + 1;
                ball.style.transitionDelay = `${i * 80}ms`;
                container.appendChild(ball);
            }
        }

        function showBalls(container) {
            container.querySelectorAll('.ball').forEach(ball => ball.classList.add('show'));
        }

        function highlightBalls(container) {
            container.querySelectorAll('.ball').forEach(ball => ball.classList.add('highlight'));
        }

        function resetAll() {
            formula.classList.remove('show');
            explanation.classList.remove('show');
            message.textContent = '';

            document.getElementById('step1').style.display = 'flex';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'none';

            document.querySelectorAll('.symbol, .arrow, .step-label').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.number-group').forEach(g => g.innerHTML = '');
        }

        async function animate() {
            resetAll();
            await sleep(500);

            // 显示公式
            formula.classList.add('show');
            await sleep(1200);

            // 第一步：显示 8 + 5
            message.textContent = '计算 8 + 5';

            createBalls(document.getElementById('group8'), 8, 'blue');
            await sleep(100);
            showBalls(document.getElementById('group8'));
            await sleep(800);

            document.getElementById('plus1').classList.add('show');
            await sleep(300);

            createBalls(document.getElementById('group5'), 5, 'pink');
            await sleep(100);
            showBalls(document.getElementById('group5'));
            await sleep(1200);

            // 显示拆分提示
            document.getElementById('arrow1').classList.add('show');
            document.getElementById('label1').classList.add('show');
            message.textContent = '把 5 拆成 2 和 3';
            await sleep(1500);

            // 第二步：显示 8 + 2 + 3
            document.getElementById('step2').style.display = 'flex';

            createBalls(document.getElementById('group8b'), 8, 'blue');
            await sleep(100);
            showBalls(document.getElementById('group8b'));

            document.getElementById('plus2').classList.add('show');
            await sleep(300);

            createBalls(document.getElementById('group2'), 2, 'pink');
            await sleep(100);
            showBalls(document.getElementById('group2'));

            document.getElementById('plus3').classList.add('show');
            await sleep(300);

            createBalls(document.getElementById('group3'), 3, 'pink');
            await sleep(100);
            showBalls(document.getElementById('group3'));
            await sleep(1200);

            // 显示凑十提示
            document.getElementById('arrow2').classList.add('show');
            document.getElementById('label2').classList.add('show');
            message.textContent = '8 + 2 = 10，凑成十！';
            highlightBalls(document.getElementById('group8b'));
            highlightBalls(document.getElementById('group2'));
            await sleep(1500);

            // 第三步：显示 10 + 3 = 13
            document.getElementById('step3').style.display = 'flex';

            createBalls(document.getElementById('group10'), 10, 'blue');
            await sleep(100);
            showBalls(document.getElementById('group10'));
            highlightBalls(document.getElementById('group10'));

            document.getElementById('plus4').classList.add('show');
            await sleep(300);

            createBalls(document.getElementById('group3b'), 3, 'pink');
            await sleep(100);
            showBalls(document.getElementById('group3b'));
            await sleep(800);

            document.getElementById('equals').classList.add('show');
            await sleep(500);

            document.getElementById('result').classList.add('show');
            message.textContent = '10 + 3 = 13，答案是 13！';
            await sleep(1500);

            // 显示解释
            explanation.classList.add('show');
            await sleep(4000);

            animate();
        }

        animate();
    </script>
</body>
</html>
