<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>减法基础</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', 'Microsoft YaHei', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            cursor: pointer;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            margin: 20px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .formula-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px 40px;
            border-radius: 16px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease;
        }

        .formula-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        .demo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .items-container {
            display: flex;
            gap: 10px;
            padding: 25px;
            background: linear-gradient(145deg, #fff5f5, #ffe0e0);
            border-radius: 20px;
            min-width: 400px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .item {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            transition: all 0.5s ease;
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.4);
        }

        .item.removed {
            opacity: 0.3;
            transform: scale(0.8);
            background: linear-gradient(135deg, #bdc3c7 0%, #95a5a6 100%);
            box-shadow: none;
            text-decoration: line-through;
        }

        .equation-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 36px;
            font-weight: 700;
            color: #2c3e50;
        }

        .equation-display .num {
            padding: 10px 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 12px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s ease;
        }

        .equation-display .num.show {
            opacity: 1;
            transform: scale(1);
        }

        .equation-display .op {
            opacity: 0;
            transition: all 0.4s ease;
        }

        .equation-display .op.show {
            opacity: 1;
        }

        .explanation {
            text-align: center;
            font-size: 20px;
            color: #c0392b;
            padding: 20px;
            background: rgba(240, 147, 251, 0.1);
            border-radius: 16px;
            border-left: 5px solid #f093fb;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .explanation.show {
            opacity: 1;
            transform: translateY(0);
        }

        .message {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
            min-height: 36px;
        }

        .pause-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90px;
            height: 90px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            pointer-events: none;
            z-index: 100;
        }

        .pause-indicator.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .pause-indicator svg {
            width: 36px;
            height: 36px;
            fill: white;
        }
    </style>
</head>
<body>
    <div class="pause-indicator" id="pauseIndicator">
        <svg viewBox="0 0 24 24" id="pauseIcon">
            <polygon points="5,3 19,12 5,21" />
        </svg>
    </div>

    <div class="app-container">
        <h1>减法基础</h1>
        <p class="subtitle">从原来的数量中拿走一部分，还剩多少</p>

        <div class="formula-box" id="formula">
            被减数 − 减数 = 差
        </div>

        <div class="message" id="message"></div>

        <div class="demo-area">
            <div class="items-container" id="itemsContainer"></div>

            <div class="equation-display">
                <span class="num" id="num1">9</span>
                <span class="op" id="op1">−</span>
                <span class="num" id="num2">4</span>
                <span class="op" id="op2">=</span>
                <span class="num" id="num3">5</span>
            </div>
        </div>

        <div class="explanation" id="explanation">
            9 是被减数，4 是减数，5 是它们的差
        </div>
    </div>

    <script>
        const formula = document.getElementById('formula');
        const message = document.getElementById('message');
        const itemsContainer = document.getElementById('itemsContainer');
        const num1 = document.getElementById('num1');
        const num2 = document.getElementById('num2');
        const num3 = document.getElementById('num3');
        const op1 = document.getElementById('op1');
        const op2 = document.getElementById('op2');
        const explanation = document.getElementById('explanation');
        const pauseIndicator = document.getElementById('pauseIndicator');

        let isPaused = false;
        let currentResolve = null;
        let remainingTime = 0;
        let startTime = 0;
        let currentTimeout = null;

        document.body.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                if (currentTimeout) {
                    clearTimeout(currentTimeout);
                    remainingTime = Math.max(0, remainingTime - (Date.now() - startTime));
                }
                pauseIndicator.classList.add('show');
            } else {
                pauseIndicator.classList.remove('show');
                if (currentResolve && remainingTime >= 0) {
                    startTime = Date.now();
                    currentTimeout = setTimeout(() => {
                        if (currentResolve) { currentResolve(); currentResolve = null; }
                    }, remainingTime);
                }
            }
        });

        function sleep(ms) {
            return new Promise(resolve => {
                currentResolve = resolve;
                remainingTime = ms;
                if (!isPaused) {
                    startTime = Date.now();
                    currentTimeout = setTimeout(() => { currentResolve = null; resolve(); }, ms);
                }
            });
        }

        function createItems(count) {
            itemsContainer.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const item = document.createElement('div');
                item.className = 'item';
                item.textContent = '🍎';
                item.id = `item-${i}`;
                itemsContainer.appendChild(item);
            }
        }

        function removeItems(start, count) {
            for (let i = start; i < start + count; i++) {
                const item = document.getElementById(`item-${i}`);
                if (item) {
                    item.classList.add('removed');
                }
            }
        }

        function resetAll() {
            formula.classList.remove('show');
            num1.classList.remove('show');
            num2.classList.remove('show');
            num3.classList.remove('show');
            op1.classList.remove('show');
            op2.classList.remove('show');
            explanation.classList.remove('show');
            itemsContainer.innerHTML = '';
            message.textContent = '';
        }

        async function animate() {
            resetAll();
            await sleep(500);

            // 显示公式
            formula.classList.add('show');
            await sleep(1500);

            // 显示原有的苹果
            message.textContent = '小明有 9 个苹果';
            createItems(9);
            num1.classList.add('show');
            await sleep(1500);

            // 减号
            op1.classList.add('show');
            await sleep(500);

            // 拿走一些
            message.textContent = '他吃掉了 4 个';
            num2.classList.add('show');
            await sleep(800);

            // 动画移除
            removeItems(5, 4);
            await sleep(1500);

            // 等号和结果
            op2.classList.add('show');
            await sleep(500);

            message.textContent = '还剩几个苹果？';
            await sleep(1000);

            num3.classList.add('show');
            message.textContent = '还剩 5 个苹果！';
            await sleep(1500);

            // 解释
            explanation.classList.add('show');
            await sleep(4000);

            animate();
        }

        animate();
    </script>
</body>
</html>
